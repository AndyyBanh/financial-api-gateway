services:
  account-service:
    build: .
    ports:
      - "8082:8082"
    env_file:
      - .env.local
    depends_on:
      - account-db

  account-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: accountdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - account-db-data:/var/lib/postgresql/data

volumes:
  account-db-data:
