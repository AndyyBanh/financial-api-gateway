spring:
  application:
    name: gatewayservice
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
  config:
    import: optional:file:.env.local[.properties]
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: transaction-service
              uri: http://transaction-service:8081
              predicates:
                - Path=/api/v1/transactions/**

            - id: account-service
              uri: http://account-service:8082
              predicates:
                - Path=/api/v1/accounts/**

            - id: fraud-service
              uri: http://fraud-service:8083
              predicates:
                - Path=/api/v1/fraud/**



server:
  port: 8080


