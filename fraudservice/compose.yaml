services:
  fraud-service:
    build: .
    ports:
      - "8083:8083"
    env_file:
      - .env.local
    depends_on:
      - fraud-db

  fraud-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: frauddb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - fraud-db-data:/var/lib/postgres/data

volumes:
  fraud-db-data: